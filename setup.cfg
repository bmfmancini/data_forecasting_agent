[flake8]
max-line-length = 100
ignore = E203,W503
exclude = 
    .git,
    __pycache__,
    .venv,
    venv,
    build,
    dist,
    *.egg-info,
    .tox,
    .eggs

[black]
line-length = 100
exclude = 
    .git,
    __pycache__,
    .venv,
    venv,
    build,
    dist,
    *.egg-info,
    .tox,
    .eggs

[mypy]
python_version = 3.11
ignore_missing_imports = True
exclude = 
    venv,
    .venv,
    build,
    dist,
    *.egg-info

[tool:pytest]
testpaths = data_forecaster/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v