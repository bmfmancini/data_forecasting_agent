version: "3.9"

services:
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - logs_data:/app/logs
      - chroma_data:/app/chroma_db
      - ../data:/app/data
    restart: unless-stopped
    networks:
      - forecasting_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    volumes:
      - ../data:/app/data
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - forecasting_network

networks:
  forecasting_network:
    driver: bridge

volumes:
  logs_data:
  chroma_data:
