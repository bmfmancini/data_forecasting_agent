# Single-machine deployment.
#
# Both frontend and backend run on one host, each fronted by its own
# nginx container that terminates TLS.  Only the nginx ports (443, 80,
# 8443) are exposed; the app containers communicate on the internal
# bridge network.
#
# For distributed deployment (frontend and backend on separate hosts),
# use docker-compose.distributed.yml on the frontend host and
# docker-compose.backend.yml on the backend host.

services:
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    env_file:
      - ../backend/.env
    volumes:
      - logs_data:/app/logs
      - chroma_data:/app/chroma_db
      - file_store_data:/app/file_store
      - ../data:/app/data
      - api_key_data:/app/data/api_keys
    restart: unless-stopped
    networks:
      - forecasting_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 40s

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.flask
    env_file:
      - ../frontend/.env
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    volumes:
      - flask_instance:/app/instance
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - forecasting_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/auth/login"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx-backend:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    environment:
      - NGINX_ROLE=backend
      - SSL_DOMAIN=${SSL_DOMAIN:-localhost}
      - BACKEND_HTTPS_PORT=${BACKEND_HTTPS_PORT:-8443}
      - BACKEND_UPSTREAM=backend:8000
    ports:
      - "${BACKEND_HTTPS_PORT:-8443}:${BACKEND_HTTPS_PORT:-8443}"
    volumes:
      - ../certs/backend:/etc/nginx/certs
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - forecasting_network
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-qO-", "https://127.0.0.1:${BACKEND_HTTPS_PORT:-8443}/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nginx-frontend:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    environment:
      - NGINX_ROLE=frontend
      - SSL_DOMAIN=${SSL_DOMAIN:-localhost}
      - FRONTEND_HTTPS_PORT=${FRONTEND_HTTPS_PORT:-443}
      - HTTP_PORT=${HTTP_PORT:-80}
      - FRONTEND_UPSTREAM=frontend:5000
    ports:
      - "${FRONTEND_HTTPS_PORT:-443}:${FRONTEND_HTTPS_PORT:-443}"
      - "${HTTP_PORT:-80}:${HTTP_PORT:-80}"
    volumes:
      - ../certs/frontend:/etc/nginx/certs
    depends_on:
      frontend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - forecasting_network
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-qO-", "https://127.0.0.1:${FRONTEND_HTTPS_PORT:-443}/auth/login"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  forecasting_network:
    driver: bridge

volumes:
  logs_data:
  chroma_data:
  file_store_data:
  flask_instance:
  api_key_data:
