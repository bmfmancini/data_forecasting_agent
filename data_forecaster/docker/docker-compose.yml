version: "3.9"

services:
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - logs_data:/app/logs
      - chroma_data:/app/chroma_db
      - file_store_data:/app/file_store
      - ../data:/app/data
      - api_key_data:/app/data/api_keys
    restart: unless-stopped
    networks:
      - forecasting_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.flask
    ports:
      - "5000:5000"
    env_file:
      - ../.env
    environment:
      - FLASK_ENV=production
      - BACKEND_URL=http://backend:8000
      - SECRET_KEY=${FLASK_SECRET_KEY:-change-me-in-production}
    volumes:
      - flask_instance:/app/instance
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - forecasting_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/auth/login"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  forecasting_network:
    driver: bridge

volumes:
  logs_data:
  chroma_data:
  file_store_data:
  flask_instance:
  api_key_data:
