# SonarQube project configuration for the Data Forecasting Agent.
# Reference: https://docs.sonarsource.com/sonarqube/latest/project-administration/analysis-parameters/

sonar.sources=data_forecaster/backend,data_forecaster/frontend
sonar.tests=tests,data_forecaster/tests
sonar.test.exclusions=tests/**,data_forecaster/tests/**

# Python version targeted by the codebase.
sonar.python.version=3.11,3.12,3.13,3.14


# Exclude vendored libraries, generated files, and non-source dirs.
sonar.exclusions=**/static/libs/**,**/node_modules/**,**/__pycache__/**,**/.mypy_cache/**,**/.pytest_cache/**,**/chroma_db/**,**/file_store/**,**/instance/**

# Coverage exclusions (files that should not count against coverage).
sonar.coverage.exclusions=**/migrations/**,**/scripts/**,**/manage.py,**/wsgi.py

# Encoding of source files.
sonar.sourceEncoding=UTF-8
