name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: "pip"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install project requirements if they exist
        if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
        if [ -f frontend/requirements.txt ]; then pip install -r frontend/requirements.txt; fi
        # Install development tools
        pip install pylint mypy black pytest pip-audit

    - name: Run Black (check mode)
      run: |
        black --check .

    - name: Run Pylint (informational)
      continue-on-error: true
      run: |
        pylint **/*.py || true

    - name: Run MyPy
      run: |
        mypy .

    - name: Run Pytest
      working-directory: .
      run: |
        pytest tests/ -v

    - name: Run pip-audit (dependency vulnerability scan)
      continue-on-error: true
      run: |
        pip-audit

    - name: Install Grype
      run: |
        curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
          | sh -s -- -b /usr/local/bin

    - name: Run Grype (filesystem vulnerability scan)
      continue-on-error: true
      run: |
        grype dir:. --fail-on high
